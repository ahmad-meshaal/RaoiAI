services:
  - type: web
    name: rawi-ai
    env: node
    plan: free # Change to 'starter' or higher for production
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: rawi-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: rawi-db
    plan: free # Change to 'standard' for production
    databaseName: rawidb
    user: rawiuser
